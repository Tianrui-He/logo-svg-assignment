Draw a simple, flat, rounded circle in pale blue as the background shape, giving the logo a friendly coin-like frame. Behind the top of the circle, place a simple bright yellow sun with a few short rounded rays peeking over the rim to suggest a cheerful outdoor pool day. Across the lower half of the circle, layer two overlapping wave bands in teal and deeper blue, drawn as smooth rounded curves like gentle ripples of a pool. Swimming just above the waves, place a small chubby cartoon fish in coral red with a round white belly, a single dot eye, and a curved smile, tilted slightly as if mid-swim. Add a few small white bubble circles of varying size trailing behind the fish to reinforce motion through water. Finish with a slightly thicker white outline around the entire circular badge to give it a clean, sticker-like finish suitable for a kids' brand.

